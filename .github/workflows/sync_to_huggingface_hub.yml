name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git --force push https://HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/Mayankojhaa/drug-detect-ai main
